<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Adolescentes/Jovens</title>
    <!-- Adicionando Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="/css/consultarAdolescente.css">
</head>
<body>
    <div id="navbarUser"></div>

    <div class="container">
        <form id="filtro-form">
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" name="cpf" class="form-control" maxlength="11" minlength="11" placeholder="Formato: XXXXXXXXXXX">
                </div>
                <div class="form-group col-md-6">
                    <label for="ativo_inativo">Status do cadastro:</label>
                    <select id="ativo_inativo" name="ativo_inativo" class="form-control">
                        <option value="1">Ativo</option>
                        <option value="0">Inativo</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="nis">NIS:</label>
                    <input type="text" id="nis" name="nis" class="form-control" maxlength="11" minlength="11">
                </div>
                <div class="form-group col-md-6">
                    <label for="n_processo">Número do processo de execução:</label>
                    <input type="text" id="n_processo" name="n_processo" class="form-control" maxlength="25">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" class="form-control" maxlength="100">
                </div>
                <div class="form-group col-md-6">
                    <label for="nome_social">Nome social:</label>
                    <input type="text" id="nome_social" name="nome_social" class="form-control" maxlength="100">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="nome_da_mae">Nome da mãe:</label>
                    <input type="text" id="nome_da_mae" name="nome_da_mae" class="form-control" maxlength="100">
                </div>
                <div class="form-group col-md-6">
                    <label for="dt_nasc">Data de nascimento:</label>
                    <input type="date" id="dt_nasc" name="dt_nasc" class="form-control" min="1900-01-01" max="">
                </div>
            </div>
                <div class="form-group col-md-12">
                    <label for="tec_ref" class="form-label">Técnico de referência:</label>
                    <select id="tec_ref" name="tec_ref" class="form-select"></select>
            </div>
            <div class="form-row">
                <div class="form-group col-md-12 d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary mr-2">Filtrar</button>
                    <button type="button" id="limpar-filtros" class="btn btn-secondary">Limpar Filtros</button>
                </div>
            </div>
        </form>   
        
        <table class="table table-striped mt-3">
            <thead class="thead-dark">
                <tr>
                    <th>CPF</th>
                    <th>NIS</th>
                    <th>Nº Processo de execução</th>
                    <th>Nome</th>
                    <th>Nome Social</th>
                    <th>Nome da Mãe</th>
                    <th>Data de Nascimento</th>
                    <th>Técnico de referência:</th>
                    <th>Editar</th>
                    <th>Ativar/Desativar</th>
                </tr>
            </thead>
            <tbody id="tabela-usuarios">
                <!-- Os resultados da consulta serão inseridos aqui dinamicamente -->
            </tbody>
        </table>
    </div>

    <script src="js/components/User/navUser.js"></script>
    <script src="/js/userGroup_ConsultarAdolescente.js"></script>
</body><br>
<footer>
    <img src="/images/ASSISTÊNCIA_E_DESENVOLVIMENTO_SOCIAL_CENTRALIZADO_FUNDO_CLARO.png" alt="logo">
    <p>&copy; 2024 - Todos os direitos reservados</p>
</footer>
</html>
