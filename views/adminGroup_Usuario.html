<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Usuários</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="../public/css/cadastrarUsuario.css">
    <link rel="stylesheet" href="/css/editarUsuario.css">
</head>
<body>
    <div id="navbar"></div>

    <!-- Seção Cadastro -->
    <div id="cadastroSection" class="container mt-5">
        <h1>CADASTRAR USUÁRIO</h1>
        <form id="cadastroForm" method="POST" action="/cadastro" autocomplete="off">
            <label for="cpf">CPF:<span class="red-asterisk">*</span></label>
            <input type="text" id="cpf" name="cpf" class="form-control" required placeholder="Formato: XXXXXXXXXXX" maxlength="11" minlength="11">
            <div id="error-message" class="error-message"></div>
            <label for="nome">Nome:<span class="red-asterisk">*</span></label>
            <input type="text" id="nome" name="nome" class="form-control" required minlength="3" maxlength="100" >
            <label for="login">E-mail:<span class="red-asterisk">*</span></label>
            <input type="email" id="login" name="login" class="form-control" required placeholder="Exemplo: usuario@prefeitura.sp.gov.br" minlength="3" maxlength="100" autocomplete="off">
            <label for="senha">Senha:<span class="red-asterisk">*</span></label>
            <input type="password" id="senha" name="senha" class="form-control" required minlength="6" maxlength="18" autocomplete="off">
            <label for="ativo_inativo">Status do cadastro:<span class="red-asterisk">*</span></label>
            <select id="ativo_inativo" name="ativo_inativo" class="form-control" required>
                <option value=""></option>
                <option value="1">Ativo</option>
                <option value="0">Inativo</option>
            </select>
            <label for="dt_nasc">Data de nascimento:<span class="red-asterisk">*</span></label>
            <input type="date" id="dt_nasc" name="dt_nasc" class="form-control" required min="1900-01-01" max="">
            <label for="perfil">Perfil:<span class="red-asterisk">*</span></label>
            <select id="perfil" name="perfil" class="form-control" required></select>
            <label for="mse">SMSE-MA:<span class="red-asterisk">*</span></label>
            <select id="mse" name="mse" class="form-control" required></select>
            <label for="dt_cadastro">Data de cadastro no sistema:</label>
            <input type="text" id="dt_cadastro" name="dt_cadastro" class="form-control" readonly>
            <label for="dt_atualizacao">Data de atualização no sistema:</label>
            <input type="text" id="dt_atualizacao" name="dt_atualizacao" class="form-control" readonly>
            <button type="submit" id="cadastrar" class="btn btn-primary">Cadastrar</button>
            <button type="button" id="cancelar" class="btn btn-secondary">Cancelar</button>
        </form>
    </div>

    <script src="js/components/Admin/navAdmin.js"></script>
    <script src="/js/adminGroup_Usuario.js"></script>
</body><br>
<footer>
    <img src="/images/ASSISTÊNCIA_E_DESENVOLVIMENTO_SOCIAL_CENTRALIZADO_FUNDO_CLARO.png" alt="logo">
    <p>&copy; 2024 - Todos os direitos reservados</p>
</footer>
</html>
