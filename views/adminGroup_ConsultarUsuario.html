<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de usuários</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/consultarUsuario.css">
</head>
<body>
    <nav id="menu-principal">
        <img src="/images/MSE.png" alt="logo-mse">
        <span>|</span>
        <a href="/consulta" class="active">Consulta de Usuários do Sistema </a>
        <span>|</span>
        <a href="/cadastro">Cadastrar Usuários do Sistema</a>
        <span>|</span>
        <a href="/verPessoas">Consulta de Adolescentes/Jovens</a>
        <span>|</span>
        <a href="/adminCadastraPessoa">Cadastrar Adolescentes/Jovens</a>
        <span>|</span>
        <a href="#" onclick="confirmLogout()">Logout</a>
        <span>|</span>
    </nav>
    <div class="container">

        <form id="filtro-form">
            <div class="form-row">
                <div class="form-group col-md-12">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" class="form-control" maxlength="100">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group col-md-4">
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" name="cpf" class="form-control" placeholder="Formato: XXXXXXXXXXX" maxlength="11" minlength="11">
                </div>
                <div class="form-group col-md-4">
                    <label for="login">E-mail:</label>
                    <input type="email" id="login" name="login" class="form-control" placeholder="Exemplo: usuario@prefeitura.sp.gov.br" maxlength="100">
                </div>
                <div class="form-group col-md-4">
                    <label for="ativo_inativo">Status do cadastro:</label>
                    <select id="ativo_inativo" name="ativo_inativo" class="form-control">
                        <option value=""></option>
                        <option value="1">Ativo</option>
                        <option value="0">Inativo</option>
                    </select>
                    </div>
            </div>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="dt_nasc">Data de nascimento:</label>
                    <input type="date" id="dt_nasc" name="dt_nasc" class="form-control" min="1900-01-01" max="">
                </div>
                <div class="form-group col-md-6">
                    <label for="perfil">Perfil:</label>
                    <select id="perfil" name="perfil" class="form-control"></select>
                </div>
            </div>
            <div class="form-row">
                    <div class="form-group col-md-12">
                        <label for="mse" class="form-label">SMSE-MA:</label>
                        <select id="mse" name="mse" class="form-select"></select>
                    </div>
                    
            </div>
    
            <div class="form-row">
                <div class="form-group col-md-12 d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary">Filtrar</button>
                    <button type="button" id="limpar-filtros" class="btn btn-secondary">Limpar Filtros</button>
                </div>
            </div>
        </form>   
        <table class="table table-responsive table-striped mt-3" >
            <thead class="thead-dark">
                <tr>
                    <th>CPF:</th>
                    <th>Nome:</th>
                    <th>E-mail:</th>
                    <th>Data de nascimento:</th>
                    <th>Tipo de perfil:</th>
                    <th>MSE:</th>
                    <th>Editar</th>
                    <th>Ativar/Desligar</th>
                </tr>
            </thead>
            <tbody id="tabela-usuarios">
                <!-- Os resultados da consulta serão inseridos aqui dinamicamente -->
            </tbody>
        </table>
    </div>
    <script src="/js/adminGroup_ConsultarUsuario.js"></script>
</body>
<footer>
    <img src="/images/ASSISTÊNCIA_E_DESENVOLVIMENTO_SOCIAL_CENTRALIZADO_FUNDO_CLARO.png" alt="logo">
    <p>&copy; 2024 - Todos os direitos reservados</p>
</footer>

</html>
